<div class="col-lg-3 col-md-4 col-6 mb-4">
    <div class="product-card">
        <div class="product-image position-relative">
            <img
                src="{{ url_for('static', filename=product.images[0]) }}"
                class="img-fluid default-img"
                alt="{{ product.name }}"
            >

            {% if product.images|length > 1 %}
            <img
                src="{{ url_for('static', filename=product.images[1]) }}"
                class="img-fluid hover-img position-absolute top-0 start-0"
                alt="{{ product.name }}"
            >
            {% endif %}
        </div>

        <div class="product-info mt-2">
            <h6 class="mb-1">{{ product.name }}</h6>
            <p class="text-muted mb-2">${{ product.price }}</p>

            <button
                class="btn btn-sm btn-dark"
                data-bs-toggle="modal"
                data-bs-target="#quickViewModal{{ product.id }}">
                Quick View
            </button>
        </div>
    </div>
</div>

<div class="modal fade" id="quickViewModal{{ product.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body p-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <img
                            id="mainImage{{ product.id }}"
                            src="{{ url_for('static', filename=product.images[0]) }}"
                            class="img-fluid mb-3 border"
                            alt="{{ product.name }}"
                        >

                        <div class="d-flex gap-2 flex-wrap">
                            {% for img in product.images %}
                                <img
                                    src="{{ url_for('static', filename=img) }}"
                                    width="70"
                                    class="border rounded thumbnail-image"
                                    alt="{{ product.name }}"
                                    onclick="changeMainImage('{{ product.id }}', '{{ url_for('static', filename=img) }}')"
                                    style="cursor: pointer;"
                                >
                            {% endfor %}
                        </div>
                    </div>

                    <div class="col-md-6">
                        <h3 class="mb-2">{{ product.name }}</h3>
                        <p class="text-muted mb-3">${{ product.price }}</p>

                        <p class="text-muted small mb-4">
                            {{ product.description }}
                        </p>

                        <form method="POST" action="{{ url_for('add_to_cart') }}">
                            <input type="hidden" name="product_id" value="{{ product.id }}">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Size *</label>
                                <select class="form-select" name="size" required>
                                    <option value="" selected disabled>Select</option>
                                    {% for size in product.sizes %}
                                        <option value="{{ size }}">{{ size }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Color *</label>
                                <select class="form-select" name="color" required>
                                    <option value="" selected disabled>Select</option>
                                    {% for color in product.colors %}
                                        <option value="{{ color }}">{{ color }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Quantity *</label>
                                <input
                                    type="number"
                                    name="quantity"
                                    class="form-control"
                                    value="1"
                                    min="1"
                                    required
                                >
                            </div>

                            <button type="submit" class="btn btn-dark w-100 py-2">
                                Add to Cart
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
