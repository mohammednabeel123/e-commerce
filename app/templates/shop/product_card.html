<div class="col-lg-3 col-md-4 col-6 mb-4">
    <div class="product-card">
        <div class="product-image">
            <img src="{{ url_for('static', filename=product.images[0]) }}" class="img-fluid" alt="{{ product.name }}">
        </div>

        <div class="product-info mt-2">
            <h6 class="mb-1">{{ product.name }}</h6>
            <p class="text-muted mb-2">${{ product.price }}</p>

            <button 
                class="btn btn-sm btn-dark"
                data-bs-toggle="modal"
                data-bs-target="#quickViewModal{{ product.id }}">
                Quick View
            </button>
        </div>
    </div>
</div>

<div class="modal fade" id="quickViewModal{{ product.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body p-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <img
                            id="mainImage{{ product.id }}"
                            src="{{ url_for('static', filename=product.images[0]) }}"
                            class="img-fluid mb-3 border"
                            alt="{{ product.name }}"
                        >

                        <div class="d-flex gap-2">
                            {% for img in product.images %}
                                <img
                                    src="{{ url_for('static', filename=img) }}"
                                    width="70"
                                    class="border rounded thumbnail-image"
                                    alt="{{ product.name }}"
                                    onclick="changeMainImage('{{ product.id }}', '{{ url_for('static', filename=img) }}')"
                                    style="cursor: pointer;"
                                >
                            {% endfor %}
                        </div>
                    </div>

                    <div class="col-md-6">
                        <h3>{{ product.name }}</h3>
                        <p class="text-muted">${{ product.price }}</p>
                        <p>Premium fashion piece from the latest collection.</p>

                        <button class="btn btn-dark">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function changeMainImage(productId, newSrc) {
        const mainImage = document.getElementById(`mainImage${productId}`);
        if (mainImage) {
            mainImage.src = newSrc;
        }
    }
</script>
